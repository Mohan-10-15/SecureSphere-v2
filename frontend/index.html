<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        SecureSphere v3
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

</head>

<body>

    <!-- LOGIN -->

    <div class="auth-container">

        <div class="auth-box">

            <h1>
                SecureSphere v3
            </h1>

            <input
                type="text"
                id="username"
                placeholder="Username"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <button onclick="signup()">
                Signup
            </button>

            <button onclick="login()">
                Login
            </button>

        </div>

    </div>

    <!-- MAIN APP -->

    <div
        id="app"
        style="display:none;"
    >

        <!-- SIDEBAR -->

        <div class="sidebar">

            <!-- PROFILE -->

            <div class="profile-card">

                <div id="profileAvatar">
                    A
                </div>

                <div id="profileName">
                    User
                </div>

                <div id="profileId">
                    SSR-000000
                </div>

                <textarea
                    id="bioInput"
                    placeholder="Write bio..."
                ></textarea>

                <button onclick="saveBio()">
                    Save Bio
                </button>

                <input
                    type="file"
                    id="profilePicInput"
                    onchange="uploadProfilePic()"
                >

                <button onclick="toggleTheme()">
                    🌙 Theme
                </button>

            </div>

            <!-- NAVIGATION -->

            <div class="nav-buttons">

                <button onclick="showSection('groups')">
                    👥 Groups
                </button>

                <button onclick="showSection('dms')">
                    💬 DMs
                </button>

                <button onclick="showSection('profile')">
                    ⚙ Profile
                </button>

                <button onclick="askAI()">
                    🤖 AI
                </button>

            </div>

            <!-- GROUPS -->

            <div
                id="groupsSection"
                class="section"
            >

                <div class="section-header">

                    <h3>
                        Groups
                    </h3>

                    <button onclick="createGroup()">
                        +
                    </button>

                </div>

                <div id="groupsList"></div>

            </div>

            <!-- DMS -->

            <div
                id="dmsSection"
                class="section"
            >

                <div class="section-header">

                    <h3>
                        Friends
                    </h3>

                </div>

                <input
                    type="text"
                    id="friendIdInput"
                    placeholder="Enter User ID"
                >

                <button onclick="sendFriendRequest()">
                    Add Friend
                </button>

                <h4>
                    Friend Requests
                </h4>

                <div id="requestsList"></div>

                <h4>
                    Friends List
                </h4>

                <div id="friendsList"></div>

            </div>

            <!-- PROFILE -->

            <div
                id="profileSection"
                class="section"
            >

                <h3>
                    Account Settings
                </h3>

                <p>
                    Customize your SecureSphere profile.
                </p>

            </div>

        </div>

        <!-- CHAT AREA -->

        <div class="chat-container">

            <!-- TOP BAR -->

            <div class="chat-header">

                <div id="chatTitle">
                    SecureSphere
                </div>

            </div>

            <!-- MESSAGES -->

            <div id="messages"></div>

            <!-- TYPING -->

            <div id="typingIndicator"></div>

            <!-- INPUT -->

            <div class="message-bar">

                <button onclick="chooseFile()">
                    📎
                </button>

                <input
                    type="file"
                    id="fileInput"
                    hidden
                >

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type message..."
                >

                <button
                    id="recordBtn"
                    onclick="toggleRecording()"
                >
                    🎤
                </button>

                <button id="sendBtn">
                    ➤
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
