<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        SecureSphere v5.1 FINAL
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

</head>

<body>

    <!-- =========================
    AUTH
    ========================== -->

    <div class="auth-container">

        <div class="auth-box">

            <div class="auth-top">

                <div class="auth-logo">
                    🔐
                </div>

                <h1>
                    SecureSphere
                </h1>

                <p class="auth-subtitle">
                    Secure Realtime Messaging Platform
                </p>

            </div>

            <input
                type="text"
                id="username"
                placeholder="Username"
            >

            <div class="password-wrapper">

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                >

                <button
                    type="button"
                    class="eye-btn"
                    onclick="togglePassword()"
                >
                    👁
                </button>

            </div>

            <button onclick="signup()">
                Signup
            </button>

            <button onclick="login()">
                Login
            </button>

            <div class="auth-footer">

                <h3>
                    Developer Info
                </h3>

                <p>
                    Mohanakrishnan C
                </p>

                <p>
                    Cybersecurity Student
                </p>

                <p>
                    SecureSphere v5.1 FINAL
                </p>

                <p>
                    End-to-End Encrypted Realtime Messaging
                </p>

            </div>

        </div>

    </div>

    <!-- =========================
    MAIN APP
    ========================== -->

    <div
        id="app"
        style="display:none;"
    >

        <!-- =========================
        SIDEBAR
        ========================== -->

        <div class="sidebar">

            <!-- PROFILE -->

            <div class="profile-card">

                <div id="profileAvatar">
                    A
                </div>

                <div class="profile-info">

                    <div id="profileName">
                        User
                    </div>

                    <div id="profileId">
                        SSR-000000
                    </div>

                </div>

            </div>

            <!-- NAVIGATION -->

            <div class="nav-menu">

                <button
                    id="groupsTab"
                    class="nav-btn active-nav"
                    onclick="showSection('groups')"
                >
                    👥
                    <span>Groups</span>
                </button>

                <button
                    id="dmsTab"
                    class="nav-btn"
                    onclick="showSection('dms')"
                >
                    💬
                    <span>DMs</span>
                </button>

                <button
                    id="profileTab"
                    class="nav-btn"
                    onclick="showSection('profile')"
                >
                    ⚙
                    <span>Profile</span>
                </button>

            </div>

            <!-- =========================
            GROUPS SECTION
            ========================== -->

            <div
                id="groupsSection"
                class="section"
            >

                <div class="section-header">

                    <h3>
                        Groups
                    </h3>

                    <div
                        style="
                            display:flex;
                            gap:8px;
                        "
                    >

                        <button
                            class="mini-btn"
                            onclick="createGroup()"
                        >
                            +
                        </button>

                        <button
                            class="mini-btn"
                            onclick="changeGroupPicture()"
                        >
                            🖼
                        </button>

                    </div>

                </div>

                <div id="groupsList"></div>

            </div>

            <!-- =========================
            DMS SECTION
            ========================== -->

            <div
                id="dmsSection"
                class="section"
                style="display:none;"
            >

                <div class="section-header">

                    <h3>
                        Friends
                    </h3>

                </div>

                <input
                    type="text"
                    id="friendIdInput"
                    placeholder="Enter User ID"
                >

                <button
                    class="action-btn"
                    onclick="sendFriendRequest()"
                >
                    Add Friend
                </button>

                <h4 class="section-title">
                    Requests
                </h4>

                <div id="requestsList"></div>

                <h4 class="section-title">
                    Friends
                </h4>

                <div id="friendsList"></div>

            </div>

            <!-- =========================
            PROFILE SECTION
            ========================== -->

            <div
                id="profileSection"
                class="section"
                style="display:none;"
            >

                <div class="section-header">

                    <h3>
                        Profile Settings
                    </h3>

                </div>

                <textarea
                    id="bioInput"
                    placeholder="Write your bio..."
                ></textarea>

                <button
                    class="action-btn"
                    onclick="saveBio()"
                >
                    Save Bio
                </button>

                <input
                    type="file"
                    id="profilePicInput"
                    onchange="uploadProfilePic()"
                >

                <button
                    class="action-btn"
                    onclick="toggleTheme()"
                >
                    Toggle Theme
                </button>

            </div>

        </div>

        <!-- =========================
        CHAT AREA
        ========================== -->

        <div class="chat-container">

            <!-- HEADER -->

            <div class="chat-header">

                <div class="chat-user">

                    <div
                        id="chatAvatar"
                        class="chat-avatar"
                    >
                        #
                    </div>

                    <div class="chat-info">

                        <div id="chatTitle">
                            SecureSphere
                        </div>

                        <div id="chatSubtitle">
                            Select a chat
                        </div>

                    </div>

                </div>

            </div>

            <!-- CHAT CONTENT -->

            <div class="chat-content">

                <div id="messages"></div>

            </div>

            <!-- TYPING -->

            <div id="typingIndicator"></div>

            <!-- MESSAGE BAR -->

            <div class="message-bar">

                <button
                    class="message-btn"
                    onclick="chooseFile()"
                >
                    📎
                </button>

                <input
                    type="file"
                    id="fileInput"
                    hidden
                >

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type message..."
                >

                <button
                    id="recordBtn"
                    class="message-btn"
                    onclick="toggleRecording()"
                >
                    🎤
                </button>

                <button
                    id="sendBtn"
                    class="send-btn"
                >
                    ➤
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
